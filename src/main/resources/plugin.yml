name: PhantomSMP
version: 1.0.0
main: com.minetwice.phantomsmp.PhantomSMP
api-version: 1.21
author: MineTwice
description: 30 Unique Power Books System for SMP

commands:
  smpstart:
    description: Start the SMP
    usage: /smpstart
    permission: phantomsmp.admin
  smprewind:
    description: Reset all books
    usage: /smprewind
    permission: phantomsmp.admin
  bookgive:
    description: Give a power book
    usage: /bookgive <player> <book>
    permission: phantomsmp.admin
  bookinfo:
    description: View book info
    usage: /bookinfo
    permission: phantomsmp.admin

permissions:
  phantomsmp.admin:
    description: Admin permissions
    default: op
